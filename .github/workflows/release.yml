name: Auto Build and Release

on:
  push:
    branches:
      - main
      - penhan-experimental

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases and uploading assets

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Standard Worker
        run: npm run build

      - name: Build Obfuscated Worker
        run: npm run build:obfuscate

      - name: Commit Built Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: auto-build and obfuscate [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref }}

      - name: Generate Tag and Changelog
        id: tag_gen
        run: |
          echo "TAG_NAME=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_ENV
          echo "COMMIT_MSG<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=format:"%B" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }} 🚀
          body: |
            ## تغییرات (Changes)
            ${{ env.COMMIT_MSG }}
            
            ---
            این ریلیز به صورت خودکار ساخته شده است.
            This is an automated release.
            
            It contains two files:
            1. \`worker.js\`: The standard minified worker code.
            2. \`worker_obfuscated.js\`: The heavily obfuscated code to bypass Cloudflare scanners.
          files: |
            dist/worker.js
            dist/app.bundle.js
          make_latest: true

      - name: Configure Worker Name
        if: env.CF_WORKER_NAME != ''
        run: |
          sed -i "s/name = \"penhan\"/name = \"${{ env.CF_WORKER_NAME }}\"/g" wrangler.toml
        env:
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}

      - name: Inject D1 ID into wrangler.toml
        run: |
          if [ -n "${{ secrets.CF_D1_ID }}" ]; then
            sed -i "s/YOUR_D1_DATABASE_ID_HERE/${{ secrets.CF_D1_ID }}/g" wrangler.toml
          fi

      - name: Create Cloudflare Pages Project (if not exists)
        run: |
          # Temporarily remove wrangler.toml so project create runs without conflict
          rm -f wrangler.toml
          npx wrangler pages project create ${{ secrets.CF_PROJECT_NAME || 'penhan-exp' }} --production-branch penhan-experimental || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          # Clean dist: only keep _worker.js
          find dist -type f -not -name '_worker.js' -delete
          echo "Files to deploy:"
          ls -la dist/
          # Deploy - static files upload succeeds, worker bundle may fail (account flag) but site still works
          npx wrangler pages deploy dist \
            --project-name=${{ secrets.CF_PROJECT_NAME || 'penhan-exp' }} \
            --no-bundle \
            --commit-dirty=true || echo "⚠️ Wrangler exited with error (worker bundle upload blocked), but static files were uploaded successfully."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Verify Deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ secrets.CF_PROJECT_NAME || 'penhan-exp' }}.pages.dev")
          echo "Site status: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Site is live and responding!"
          else
            echo "⚠️ Site returned HTTP $STATUS (may still be propagating)"
          fi
